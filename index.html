<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cute Waterfall Messages</title>

  <!-- Momo Signature Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Momo+Signature&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
      background: url('bg.jpg') no-repeat center center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      animation: fadeInBody 1.5s ease-in forwards;
    }

    @keyframes fadeInBody {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Center image styling */
    .center-image {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.5);
      opacity: 0;
      animation: popUp 2s ease-out forwards, hoverFloat 5s ease-in-out infinite;
      max-width: 70vw;
      width: auto;
      height: auto;
      z-index: 3;
      pointer-events: none;
    }

    @keyframes popUp {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
      60%  { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    @keyframes hoverFloat {
      0%   { transform: translate(-50%, -50%) scale(1); }
      50%  { transform: translate(-50%, -52%) scale(1.03); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    /* Waterfall messages — slightly smaller than original */
    .floating-message {
      position: absolute;
      top: -10vh;
      opacity: 0;
      font-family: "Momo Signature", cursive;
      font-size: 1.5rem;        /* reduced from 2rem */
      color: white;
      text-shadow: 0 0 8px rgba(255,255,255,0.9);
      animation: fallDown 8s linear forwards;
      pointer-events: none;
      white-space: nowrap;
      z-index: 2;
    }

    @keyframes fallDown {
      0%   { transform: translateY(-10vh); opacity: 0; }
      15%  { opacity: 1; }
      85%  { opacity: 1; }
      100% { transform: translateY(110vh); opacity: 0; }
    }

    /* Music Button */
    .music-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      z-index: 5;
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(5px);
      transition: transform 0.3s ease, background 0.3s ease;
    }

    .music-btn:hover {
      transform: scale(1.1);
      background: rgba(255, 255, 255, 0.9);
    }

    .music-btn span {
      font-size: 1.6rem;
      color: #ff6fa8;
      user-select: none;
    }

    /* Higher-DPI / 2x screens */
    @media (min-resolution: 2dppx), (-webkit-min-device-pixel-ratio: 2) {
      .center-image {
        max-width: 75vw;
        transform: translate(-50%, -50%) scale(0.75);
      }
    }

    @media (max-width: 768px) {
      .center-image {
        max-width: 90vw;
        transform: translate(-50%, -50%) scale(0.6);
      }
      .floating-message { font-size: 1.2rem; }
      .music-btn { width: 45px; height: 45px; }
    }

    @media (max-width: 480px) {
      .center-image {
        max-width: 95vw;
        transform: translate(-50%, -50%) scale(0.7);
      }
      .floating-message { font-size: 1rem; }
      .music-btn { width: 40px; height: 40px; }
    }
  </style>
</head>
<body>

  <!-- Main Image -->
  <img src="img1.png" alt="Center Image" class="center-image" id="mainImage">

  <!-- Music Control Button -->
  <div class="music-btn" id="musicBtn">
    <span>🎵</span>
  </div>

  <!-- Background Music — path: song.mp3 sits next to index.html -->
  <audio id="bgMusic" src="song.mp3" preload="auto" loop></audio>

  <script>
    window.addEventListener('load', () => {
      const music    = document.getElementById('bgMusic');
      const image    = document.getElementById('mainImage');
      const body     = document.body;
      const musicBtn = document.getElementById('musicBtn');
      let isPlaying  = false;

      // Log any load errors so you can see them in DevTools console
      music.addEventListener('error', () => {
        console.error('Audio failed to load. Check that song.mp3 is in the same folder as index.html.');
        musicBtn.title = 'Audio file not found';
      });

      function startMusic() {
        music.play().then(() => {
          musicBtn.innerHTML = "<span>🎶</span>";
          isPlaying = true;
        }).catch(err => {
          console.warn("Play failed:", err);
        });
      }

      // Try to play on the very first user interaction anywhere on the page
      // (works around browser autoplay restrictions)
      function onFirstInteraction() {
        if (!isPlaying) startMusic();
        document.removeEventListener('click', onFirstInteraction);
        document.removeEventListener('keydown', onFirstInteraction);
        document.removeEventListener('touchstart', onFirstInteraction);
      }
      document.addEventListener('click', onFirstInteraction);
      document.addEventListener('keydown', onFirstInteraction);
      document.addEventListener('touchstart', onFirstInteraction);

      // Music Button Toggle
      musicBtn.addEventListener('click', (e) => {
        e.stopPropagation(); // handled separately above on first play
        if (isPlaying) {
          music.pause();
          musicBtn.innerHTML = "<span>🔇</span>";
          isPlaying = false;
        } else {
          startMusic();
        }
      });

      // Cute messages
      const messages = [
        "You're my sunshine ☀️", "Love you always 💖", "Cutie pie 🧸", "Stay magical ✨",
        "Smiles all day 😊", "Sweet like candy 🍬", "You're my dream 🌙",
        "Pretty soul 🌷", "Warm cuddles 🐻", "You're adorable 💐",
        "Heart full of love 💗", "Dream big 🌈", "You're my melody 🎵",
        "Always with you 🌻", "Stay cute 🐰", "Shine bright 💎",
        "Hugs and kisses 💋", "You make me blush 🌺", "My favorite human 💞"
      ];

      function spawnMessage() {
        const msg = document.createElement('div');
        msg.className = 'floating-message';
        msg.textContent = messages[Math.floor(Math.random() * messages.length)];

        const bodyWidth = window.innerWidth;
        const imageRect = image.getBoundingClientRect();

        // Random size within a slightly smaller range
        const size = Math.random() * 0.5 + 0.9; // 0.9–1.4rem multiplier
        msg.style.fontSize = `${size}rem`;

        let x;
        const safeLeft  = imageRect.left  - 180;
        const safeRight = imageRect.right + 180;
        let tries = 0;
        do {
          x = Math.random() * (bodyWidth - 200);
          tries++;
        } while (x > safeLeft && x < safeRight && tries < 30);

        msg.style.left = `${x}px`;

        const colors = [
          'rgba(255,182,193,0.9)',
          'rgba(173,216,230,0.9)',
          'rgba(221,160,221,0.9)',
          'rgba(152,251,152,0.9)',
          'rgba(255,250,205,0.9)'
        ];
        msg.style.textShadow = `0 0 15px ${colors[Math.floor(Math.random() * colors.length)]}`;

        body.appendChild(msg);
        setTimeout(() => msg.remove(), 8000);
      }

      // Gentle waterfall effect — starts after 2s, fires every 800ms
      setTimeout(() => {
        setInterval(spawnMessage, 800);
      }, 2000);
    });
  </script>
</body>
</html>
